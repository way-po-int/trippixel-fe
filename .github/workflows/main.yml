name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-build-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Create .env file
      run: |
        echo "NEXT_PUBLIC_IMAGE_DOMAINS=test" >> .env
        echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=test" >> .env
        echo "NEXT_PUBLIC_API_BASE_URL=test" >> .env
        echo "NEXT_PUBLIC_SERVICE_TERMS_URL=test" >> .env
        echo "NEXT_PUBLIC_PRIVACY_POLICY_URL=test" >> .env
        echo "NEXT_PUBLIC_GUIDE_URL=test" >> .env
        echo "NEXT_PUBLIC_VOC_URL=test" >> .env
        
    - name: Run ESLint
      run: npm run lint --if-present
      
    - name: Run TypeScript check
      run: npx tsc --noEmit --if-present
      
    - name: Build application
      run: npm run build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: build-logs
        path: |
          .next/
          npm-debug.log*
          yarn-debug.log*
          yarn-error.log*
        retention-days: 1
